<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Narrador</title>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    width: 300px;
}

.avatar {
    width: 140px;
    height: 140px;
    background: red;
    border-radius: 50%;
    margin: auto;
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: red;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="avatar"></div>

    <input id="evento" placeholder="Digite exatamente o que o narrador deve falar">

    <select id="modo">
        <option value="br">🇧🇷 Narrador Brasileiro</option>
        <option value="en_gb">🇬🇧 Narrador Inglês</option>
        <option value="en_us">🇺🇸 Narrador Americano</option>
    </select>

    <button onclick="narrar()">🎙️ Narrar</button>

</div>

<script>
function narrar() {
    const texto = document.getElementById("evento").value;
    const modo = document.getElementById("modo").value;

    if (!texto) return;

    fetch("/narrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body:
            "mensagem=" + encodeURIComponent(texto) +
            "&modo=" + modo
    })
    .then(res => res.json())
    .then(data => {
        if (data.audio) {
            const audio = new Audio(data.audio);
            audio.play();
        }
    });
}
</script>

</body>
</html>
