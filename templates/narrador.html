<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Narrador IA</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 320px;
    text-align: center;
}

.avatar {
    width: 120px;
    height: 120px;
    background: #2563eb;
    border-radius: 50%;
    margin: auto;
    transition: 0.3s;
}

.respondendo {
    background: #ef4444;
    box-shadow: 0 0 30px #ef4444;
}

input, select, button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}

button {
    background: #2563eb;
    color: white;
}

#status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

    <div id="avatar" class="avatar"></div>

    <p id="status">Pronto</p>

    <!-- TEXTO -->
    <input id="texto" placeholder="Digite a narração...">

    <!-- MODO -->
    <select id="modo">
        <option value="br">🇧🇷 BR (Edge)</option>
        <option value="br_11">🔥 BR (ElevenLabs)</option>
        <option value="en_gb">🇬🇧 UK</option>
        <option value="en_us">🇺🇸 US</option>
    </select>

    <!-- BOTÃO -->
    <button onclick="narrar()">🎙️ Narrar</button>

</div>

<script>
let currentAudio = null;

const avatar = document.getElementById("avatar");
const statusText = document.getElementById("status");

// =======================
// NARRAR
// =======================
function narrar() {
    const texto = document.getElementById("texto").value;
    const modo = document.getElementById("modo").value;

    if (!texto) return;

    avatar.className = "avatar respondendo";
    statusText.innerText = "Gerando narração...";

    // interrompe áudio anterior
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
    }

    fetch("/narrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "mensagem=" + encodeURIComponent(texto) + "&modo=" + modo
    })
    .then(res => res.json())
    .then(data => {

        currentAudio = new Audio(data.audio);

        currentAudio.play().catch(() => {
            statusText.innerText = "Erro ao tocar";
        });

        currentAudio.onended = () => {
            avatar.className = "avatar";
            statusText.innerText = "Pronto";
        };

    })
    .catch(() => {
        avatar.className = "avatar";
        statusText.innerText = "Erro";
    });
}
</script>

</body>
</html>
