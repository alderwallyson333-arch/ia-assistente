<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;

    display: flex;
    justify-content: center;   /* horizontal */
    align-items: center;       /* vertical */
    height: 100vh;
}

/* caixa principal */
.container {
    width: 90%;
    max-width: 400px;
    background: #111827;
    border-radius: 15px;
    padding: 15px;
}

/* título */
.header {
    text-align: center;
    margin-bottom: 15px;
}

/* chat */
.chat {
    min-height: 100px;
    margin-bottom: 10px;
}

.bot {
    background: #1f2937;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}

/* área de input */
.input-area {
    display: flex;
    gap: 5px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-weight: bold;
}

/* botão de voz separado */
.voice-btn {
    margin-top: 10px;
    width: 100%;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        🤖 IA Assistente
    </div>

    <div class="chat">
        {% if resposta %}
            <div class="bot">{{ resposta }}</div>
        {% endif %}
    </div>

    <form method="POST" class="input-area">
        <input type="text" name="mensagem" id="mensagem" placeholder="Digite ou fale..." required>
        <button type="submit">Enviar</button>
    </form>

    <button class="voice-btn" onclick="falar()">🎤 Falar</button>

    {% if audio %}
    <audio id="audio">
        <source src="{{ audio }}" type="audio/mp3">
    </audio>
    {% endif %}

</div>

<script>
let reconhecendo = false;

function falar() {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "pt-BR";
    recognition.continuous = false;
    recognition.interimResults = false;

    reconhecendo = true;

    recognition.onresult = function(event) {
        const texto = event.results[0][0].transcript;

        // coloca no input (opcional)
        const input = document.getElementById("mensagem");
        if (input) input.value = texto;

        // 🔥 ENVIA AUTOMATICAMENTE
        fetch("/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "mensagem=" + encodeURIComponent(texto)
        }).then(() => location.reload());
    };

    recognition.onend = function() {
        reconhecendo = false;
    };

    recognition.start();
}

// 🔊 tocar áudio uma vez
window.onload = function() {
    const audio = document.getElementById("audio");
    if (audio) {
        audio.pause();
        audio.currentTime = 0;
        audio.play();
    }
};
</script>

</body>
</html>
