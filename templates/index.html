<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    padding: 15px;
    background: #1a1a1a;
    text-align: center;
    font-weight: bold;
}

.chat {
    padding: 10px;
}

.bot {
    background: #1a1a1a;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    max-width: 85%;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #1a1a1a;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2b6cff;
    color: white;
}
</style>

</head>

<body>

<div class="header">🤖 IA Assistente</div>

<div class="chat">
    {% if resposta %}
        <div class="bot">{{ resposta }}</div>
    {% endif %}
</div>

<form method="POST" class="input-area">
    <input type="text" name="mensagem" id="mensagem" placeholder="Digite ou fale..." required>
    <button type="submit">Enviar</button>
</form>

<button onclick="falar()">🎤 Falar</button>

{% if audio %}
<audio id="audio">
    <source src="{{ audio }}" type="audio/mp3">
</audio>
{% endif %}

<script>
function falar() {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "pt-BR";

    recognition.onresult = function(event) {
        document.getElementById("mensagem").value =
            event.results[0][0].transcript;
    };

    recognition.start();
}

// 🔊 GARANTIR 1 ÁUDIO APENAS
window.onload = function() {
    const audio = document.getElementById("audio");
    if (audio) {
        audio.pause();
        audio.currentTime = 0;
        audio.play();
    }
};
</script>

</body>
</html>
