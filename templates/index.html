<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-family: Arial;
}

.container {
    text-align: center;
}

.avatar {
    width: 120px;
    height: 120px;
    background: #2563eb;
    border-radius: 50%;
    margin: auto;
    transition: 0.3s;
}

.ouvindo {
    background: #22c55e;
    box-shadow: 0 0 30px #22c55e;
}

.processando {
    background: #f59e0b;
    box-shadow: 0 0 30px #f59e0b;
}

.inativo {
    background: #2563eb;
}

button {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
}

#status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">

    <div id="avatar" class="avatar inativo"></div>

    <p id="status">Inativo</p>

    <button onclick="iniciar()">▶️ Iniciar</button>
    <button onclick="parar()">⏹️ Parar</button>

</div>

<script>
let isActive = false;
let isListening = false;
let isSpeaking = false;

let recognition = new webkitSpeechRecognition();

const avatar = document.getElementById("avatar");
const statusText = document.getElementById("status");

// CONFIG
recognition.lang = "pt-BR";
recognition.continuous = false;
recognition.interimResults = false;

// ▶️ INICIAR
function iniciar() {
    if (isActive) return;

    isActive = true;
    iniciarReconhecimento();
}

// ⏹️ PARAR
function parar() {
    isActive = false;

    if (recognition) recognition.abort();

    atualizarEstado("inativo", "Inativo");
}

// 🎤 INICIAR RECONHECIMENTO
function iniciarReconhecimento() {
    if (!isActive || isListening || isSpeaking) return;

    try {
        recognition.start();
    } catch (e) {
        return;
    }
}

// 🔄 ESTADO VISUAL
function atualizarEstado(classe, texto) {
    avatar.className = "avatar " + classe;
    statusText.innerText = texto;
}

// 🎤 EVENTOS
recognition.onstart = () => {
    isListening = true;
    atualizarEstado("ouvindo", "Estou ouvindo...");
};

recognition.onresult = (event) => {
    const texto = event.results[0][0].transcript;
    isListening = false;
    enviarPergunta(texto);
};

recognition.onerror = () => {
    isListening = false;
    reiniciar();
};

recognition.onend = () => {
    isListening = false;
};

// 🚀 ENVIO
function enviarPergunta(texto) {
    if (!isActive) return;

    isSpeaking = true;
    atualizarEstado("processando", "Pensando...");

    fetch("/perguntar", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "mensagem=" + encodeURIComponent(texto)
    })
    .then(res => res.json())
    .then(data => {

        if (data.audio) {
            const audio = new Audio(data.audio);

            setTimeout(() => {
                audio.play().catch(() => {
                    isSpeaking = false;
                    reiniciar();
                });
            }, 300);

            audio.onended = () => {
                isSpeaking = false;
                reiniciar();
            };
        } else {
            isSpeaking = false;
            reiniciar();
        }

        atualizarEstado("inativo", "Aguardando...");
    })
    .catch(() => {
        isSpeaking = false;
        reiniciar();
    });
}

// 🔁 LOOP CONTROLADO
function reiniciar() {
    if (!isActive) {
        atualizarEstado("inativo", "Inativo");
        return;
    }

    setTimeout(() => {
        iniciarReconhecimento();
    }, 500);
}
</script>

</body>
</html>
