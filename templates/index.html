<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* container central */
.container {
    text-align: center;
    background: #111827;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
}

/* avatar animado */
.avatar {
    width: 120px;
    height: 120px;
    background: #2563eb;
    border-radius: 50%;
    margin: auto;
    box-shadow: 0 0 20px #2563eb;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* input */
.input-area {
    display: flex;
    margin-top: 20px;
    gap: 5px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-weight: bold;
}

/* botão voz */
.voice-btn {
    margin-top: 15px;
    width: 100%;
}
</style>

</head>

<body>

<div class="container">

    <!-- Avatar -->
    <div class="avatar"></div>

    <!-- Input (digitado) -->
    <form method="POST" class="input-area">
        <input type="text" name="mensagem" id="mensagem" placeholder="Digite ou fale..." required>
        <button type="submit">Enviar</button>
    </form>

    <!-- Botão de voz -->
    <button class="voice-btn" onclick="falar()">🎤 Falar</button>

    <!-- Áudio -->
    {% if audio %}
    <audio id="audio">
        <source src="{{ audio }}" type="audio/mp3">
    </audio>
    {% endif %}

</div>

<script>
// 🎤 VOZ → ENVIO AUTOMÁTICO
function falar() {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "pt-BR";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = function(event) {
        const texto = event.results[0][0].transcript;

        // coloca no input
        const input = document.getElementById("mensagem");
        input.value = texto;

        // 🔥 envia automaticamente
        input.form.submit();
    };

    recognition.start();
}

// 🔊 ÁUDIO SEM DUPLICAR
window.onload = function() {
    const audio = document.getElementById("audio");
    if (audio) {
        audio.pause();
        audio.currentTime = 0;
        audio.play();
    }
};
</script>

</body>
</html>
