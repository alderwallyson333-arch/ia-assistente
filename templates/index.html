<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Assistente IA</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    font-family: Arial;
}

.container {
    text-align: center;
    width: 300px;
}

.avatar {
    width: 120px;
    height: 120px;
    background: #2563eb; /* 🔵 neutro */
    border-radius: 50%;
    margin: auto;
    transition: 0.3s;
}

.ouvindo { 
    background: #22c55e; /* 🟢 */
    box-shadow: 0 0 30px #22c55e;
}

.pensando { 
    background: #eab308; /* 🟡 */
    box-shadow: 0 0 30px #eab308;
}

.respondendo { 
    background: #ef4444; /* 🔴 */
    box-shadow: 0 0 30px #ef4444;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.botao-narrador {
    background: #ef4444; /* 🔴 destaque */
}

#status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="container">

    <div id="avatar" class="avatar"></div>

    <p id="status">Pronto</p>

    <!-- MODO TEXTO -->
    <input id="texto" placeholder="Digite sua pergunta">
    <button onclick="modoTexto()">Enviar</button>

    <!-- MODO VOZ -->
    <button onclick="modoMicrofone()">🎤 Falar uma vez</button>

    <!-- MODO CONTÍNUO -->
    <button onclick="toggleContinuo()">🔁 Conversa contínua OFF</button>

    <!-- SEPARADOR -->
    <div style="margin-top:20px; opacity:0.2;">────────────</div>

    <!-- NARRADOR -->
    <button class="botao-narrador" onclick="abrirNarrador()">🎙️ Modo Narrador</button>

</div>

<script>
let recognition = new webkitSpeechRecognition();

let isContinuous = false;
let isListening = false;
let isSpeaking = false;

let currentAudio = null;

const avatar = document.getElementById("avatar");
const statusText = document.getElementById("status");
const btnContinuo = document.querySelectorAll("button")[2];

recognition.lang = "pt-BR";
recognition.continuous = false;
recognition.interimResults = false;

// =======================
// TEXTO
// =======================
function modoTexto() {
    if (isSpeaking) return;

    const texto = document.getElementById("texto").value;
    if (!texto) return;

    enviarPergunta(texto);
}

// =======================
// VOZ
// =======================
function modoMicrofone() {
    if (isListening || isSpeaking) return;

    recognition.start();
}

// =======================
// CONTÍNUO ON/OFF
// =======================
function toggleContinuo() {
    isContinuous = !isContinuous;

    btnContinuo.innerText = isContinuous
        ? "🔁 Conversa contínua ON"
        : "🔁 Conversa contínua OFF";

    if (isContinuous) {
        iniciarLoop();
    } else {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        isSpeaking = false;
        atualizarEstado("", "Parado");
    }
}

// =======================
// RECONHECIMENTO
// =======================
recognition.onstart = () => {
    isListening = true;
    atualizarEstado("ouvindo", "Ouvindo...");
};

recognition.onresult = (event) => {
    const texto = event.results[0][0].transcript;
    isListening = false;
    enviarPergunta(texto);
};

recognition.onend = () => {
    isListening = false;

    if (isContinuous && !isSpeaking) {
        iniciarLoop();
    }
};

// =======================
// ENVIO IA
// =======================
function enviarPergunta(texto) {
    isSpeaking = true;
    atualizarEstado("pensando", "Pensando...");

    fetch("/perguntar", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "mensagem=" + encodeURIComponent(texto)
    })
    .then(res => res.json())
    .then(data => {

        atualizarEstado("respondendo", "Respondendo...");

        currentAudio = new Audio(data.audio);

        setTimeout(() => {
            currentAudio.play().catch(() => {
                isSpeaking = false;
            });
        }, 300);

        currentAudio.onended = () => {
            isSpeaking = false;

            if (isContinuous) iniciarLoop();
            else atualizarEstado("", "Pronto");
        };
    })
    .catch(() => {
        isSpeaking = false;
        atualizarEstado("", "Erro");
    });
}

// =======================
// LOOP CONTÍNUO
// =======================
function iniciarLoop() {
    if (!isContinuous || isListening || isSpeaking) return;

    setTimeout(() => {
        try {
            recognition.start();
        } catch(e){}
    }, 500);
}

// =======================
// NAVEGAÇÃO NARRADOR
// =======================
function abrirNarrador() {
    window.location.href = "/narrador";
}

// =======================
// UI
// =======================
function atualizarEstado(classe, texto) {
    avatar.className = "avatar " + classe;
    statusText.innerText = texto;
}
</script>

</body>
</html>
