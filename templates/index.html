<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Assistente</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            background: #1a1a1a;
            text-align: center;
            font-weight: bold;
        }

        .chat {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .bot {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 85%;
        }

        .user {
            background: #2b6cff;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 85%;
            margin-left: auto;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #1a1a1a;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: #2b6cff;
            color: white;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        🤖 IA Assistente
    </div>

    <div class="chat">

        {% if resposta %}
        <div class="bot">
            {{ resposta }}
        </div>
        {% endif %}

    </div>

    <form method="POST" class="input-area">
        <input type="text" name="mensagem" placeholder="Digite sua pergunta..." required>
        <button type="submit">Enviar</button>
    </form>

</div>

</body>
          </html>
